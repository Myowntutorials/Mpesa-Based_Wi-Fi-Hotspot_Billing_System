version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://wifi_user:${DB_PASSWORD}@db:5432/wifi_billing
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - MPESA_ENABLED=true
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
      - MPESA_SHORTCODE=${MPESA_SHORTCODE}
      - MPESA_PASSKEY=${MPESA_PASSKEY}
      - MPESA_CALLBACK_URL=${COOLIFY_APP_URL}/api/mpesa/callback
      - MIKROTIK_ENABLED=${MIKROTIK_ENABLED}
      - MIKROTIK_HOST=${MIKROTIK_HOST}
      - MIKROTIK_USER=${MIKROTIK_USER}
      - MIKROTIK_PASSWORD=${MIKROTIK_PASSWORD}
      - MIKROTIK_PORT=${MIKROTIK_PORT}
      - LOAN_WIFI_DURATION_HOURS=${LOAN_WIFI_DURATION_HOURS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wifi-network
    volumes:
      - app_logs:/app/logs
      - app_backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/welcome"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=wifi_billing
      - POSTGRES_USER=wifi_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - app_backups:/backups
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wifi_user -d wifi_billing"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wifi-network

  # Optional: Redis for session storage and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - wifi-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  app_logs:
  app_backups:
  redis_data:

networks:
  wifi-network:
    driver: bridge
